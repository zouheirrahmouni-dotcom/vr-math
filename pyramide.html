<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Squelette des Pyramides - Siliana VR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse">
      
      <a-sky color="#f8f8f8"></a-sky>
      <a-grid position="0 0 0" color="#ccc"></a-grid>

      <a-entity position="0 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 35000; easing: linear">
        <a-camera position="0 3 10" look-controls>
          <a-cursor color="yellow"></a-cursor>
        </a-camera>
      </a-entity>

      <a-entity position="-4 0 0">
        <a-cone radius-bottom="2" height="3" segments-radial="3" color="#4CC3D9" opacity="0.2"></a-cone>
        
        <a-cone radius-bottom="2" height="3" segments-radial="3" color="green" wireframe="true" wireframe-linewidth="2"></a-cone>

        <a-entity line="start: 0 -1.5 0; end: 0 1.5 0; color: red"></a-entity>
        <a-text value="h" position="0.1 0 0" color="red" width="5"></a-text>

        <a-ring color="blue" radius-inner="1.99" radius-outer="2.01" segments-theta="64" rotation="-90 0 0" position="0 -1.5 0"></a-ring>
        
        <a-entity line="start: 0 -1.5 0; end: 0 -1.5 -2; color: blue"></a-entity>
        <a-text value="R" position="0 -1.2 -1" color="blue" width="4"></a-text>

        <a-text value="L = sqrt(h2 + R2)" position="0.5 0.8 -1" color="green" width="3.5"></a-text>
        <a-text value="Base Triangulaire" position="-1.5 3.5 0" color="#333" width="5"></a-text>
      </a-entity>

      <a-entity position="4 0 0">
        <a-cone radius-bottom="2" height="3" segments-radial="4" color="#FFC65D" opacity="0.2" rotation="0 45 0"></a-cone>
        
        <a-cone radius-bottom="2" height="3" segments-radial="4" color="green" wireframe="true" wireframe-linewidth="2" rotation="0 45 0"></a-cone>

        <a-entity line="start: 0 -1.5 0; end: 0 1.5 0; color: red"></a-entity>
        <a-text value="h" position="0.1 0 0" color="red" width="5"></a-text>

        <a-ring color="blue" radius-inner="1.99" radius-outer="2.01" segments-theta="64" rotation="-90 0 0" position="0 -1.5 0"></a-ring>
        
        <a-entity line="start: 0 -1.5 0; end: 1.414 -1.5 1.414; color: blue"></a-entity>
        <a-text value="R" position="0.7 -1.2 0.7" color="blue" width="4"></a-text>

        <a-text value="L = sqrt(h2 + R2)" position="1 1 1" color="green" width="3.5"></a-text>
        <a-text value="Base Carree" position="-1 3.5 0" color="#333" width="5"></a-text>
      </a-entity>

      <a-light type="ambient" color="#fff"></a-light>
    </a-scene>
  </body>
</html>
