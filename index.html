<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Laboratoire de Géométrie 3D - Siliana</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      AFRAME.registerComponent('interaction-regard', {
        init: function () {
          var el = this.el;
          var originalColor = el.getAttribute('material').color;

          el.addEventListener('mouseenter', function () {
            el.setAttribute('color', '#FF0000'); // Devient rouge au regard
            el.setAttribute('scale', '1.2 1.2 1.2'); // Grossit un peu
          });

          el.addEventListener('mouseleave', function () {
            el.setAttribute('color', originalColor); // Reprend sa couleur
            el.setAttribute('scale', '1 1 1');
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-sky color="#222"></a-sky>
      <a-grid></a-grid> <a-box position="-3 1.5 -5" 
             color="#4CC3D9" 
             interaction-regard
             animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
      </a-box>

      <a-cone position="0 1.5 -7" 
              radius-bottom="1.5" 
              height="2.5" 
              segments-radial="4" 
              color="#FFC65D" 
              opacity="0.6"
              interaction-regard>
        <a-entity line="start: 0 -1.25 0; end: 0 1.25 0; color: white"></a-entity>
      </a-cone>

      <a-cylinder position="3 1.5 -5" 
                  radius="0.7" 
                  height="2" 
                  color="#FF5733"
                  interaction-regard>
      </a-cylinder>

      <a-box position="-5 1.5 -8" 
             width="1" height="2" depth="4" 
             color="#9B59B6"
             interaction-regard>
      </a-box>

      <a-cone position="5 1.5 -8" 
              radius-bottom="1" 
              height="2" 
              color="#2ECC71"
              interaction-regard>
      </a-cone>

      <a-entity position="0 1.6 0">
        <a-camera look-controls wasd-controls>
          <a-cursor fuse="true" fuse-timeout="1000" color="red"></a-cursor>
        </a-camera>
      </a-entity>

      <a-text value="Regardez un objet pour l'animer" position="-2 3 -4" color="white" width="6"></a-text>
      
    </a-scene>
  </body>
</html>
