<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Survol Géométrique - Lycée Pilote Siliana</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      // Petit script pour faire "parler" les objets quand on clique dessus
      AFRAME.registerComponent('info-clic', {
        schema: {nom: {type: 'string'}},
        init: function () {
          var el = this.el;
          var data = this.data;
          el.addEventListener('click', function () {
            // Change la couleur au clic pour confirmer l'interaction
            el.setAttribute('color', 'white');
            alert("Ceci est un(e) : " + data.nom);
            setTimeout(() => { el.setAttribute('color', el.getAttribute('data-original-color')); }, 500);
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse">
      
      <a-assets>
        </a-assets>

      <a-sky color="#1a1a1a"></a-sky>
      <a-grid position="0 0 0" cell-size="2" color="#444"></a-grid>

      <a-entity position="0 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
        <a-camera position="0 2 10" look-controls>
            <a-cursor color="yellow" radius-inner="0.02" radius-outer="0.03"></a-cursor>
        </a-camera>
      </a-entity>

      <a-box position="0 2 0" width="4" height="4" depth="4" 
             color="#4CC3D9" opacity="0.3" wireframe="true"
             info-clic="nom: Cube" data-original-color="#4CC3D9">
      </a-box>

      <a-cone position="8 2 -5" radius-bottom="3" height="5" segments-radial="4" 
              color="#FFC65D" opacity="0.7"
              info-clic="nom: Pyramide" data-original-color="#FFC65D">
      </a-cone>

      <a-cylinder position="-8 2 -5" radius="2" height="6" 
                  color="#FF5733" opacity="0.7"
                  info-clic="nom: Cylindre" data-original-color="#FF5733">
      </a-cylinder>

      <a-box position="0 2 -12" width="8" height="2" depth="2" 
             color="#9B59B6" opacity="0.7"
             info-clic="nom: Parallélépipède Rectangle" data-original-color="#9B59B6">
      </a-box>

      <a-cone position="0 8 0" radius-bottom="2" height="4" 
              color="#2ECC71" opacity="0.7"
              info-clic="nom: Cône de révolution" data-original-color="#2ECC71">
      </a-cone>

      <a-light type="ambient" color="#bbb"></a-light>
      <a-light type="directional" color="#fff" intensity="0.6" position="-1 1 1"></a-light>

    </a-scene>
  </body>
</html>
